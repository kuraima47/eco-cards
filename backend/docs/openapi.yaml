      tags:
        - group-player
      summary: Delete a group player by group ID and user ID
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Group player deleted successfully
  /api/group-accepted-cards:
    get:
      tags:
        - group-accepted-card
      summary: Get all group accepted cards
      responses:
        '200':
          description: A list of group accepted cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupAcceptedCard'
    post:
      tags:
        - group-accepted-card
      summary: Create a new group accepted card
      requestBody:
        description: Group accepted card object that needs to be added
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAcceptedCard'
      responses:
        '201':
          description: Group accepted card created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupAcceptedCard'
  /api/group-accepted-cards/group/{groupId}:
    get:
      tags:
        - group-accepted-card
      summary: Get group accepted cards by group ID
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Group accepted cards for the specified group
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupAcceptedCard'
  /api/group-accepted-cards/{groupId}/{cardId}:
    delete:
      tags:
        - group-accepted-card
      summary: Delete a group accepted card by group ID and card ID
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Group accepted card deleted successfully
components:
  schemas:
    User:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        email:
          type: string
        userPassword:
          type: string
        role:
          type: string
          enum:
            - admin
            - player
    Card:
      type: object
      properties:
        cardId:
          type: integer
        cardName:
          type: string
        cardActual:
          type: string
        cardProposition:
          type: string
        cardImage:
          type: string
    Deck:
      type: object
      properties:
        deckId:
          type: integer
        deckName:
          type: string
        adminId:
          type: integer
    DeckContent:
      type: object
      properties:
        deckId:
          type: integer
        cardId:
          type: integer
    Session:
      type: object
      properties:
        sessionId:
          type: integer
        adminId:
          type: integer
        sessionName:
          type: string
        deckId:
          type: integer
        createdAt:
          type: string
          format: date-time
    Group:
      type: object
      properties:
        groupId:
          type: integer
        sessionId:
          type: integer
        groupName:
          type: string
    GroupPlayer:
      type: object
      properties:
        groupId:
          type: integer
        userId:
          type: integer
    GroupAcceptedCard:
      type: object
      properties:
        groupId:
          type: integer
        cardId:
          type: integer