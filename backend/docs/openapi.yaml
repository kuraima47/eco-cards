          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Group deleted successfully
  /api/group-players:
    get:
      tags:
        - group-player
      summary: Get all group players
      responses:
        '200':
          description: A list of group players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupPlayer'
    post:
      tags:
        - group-player
      summary: Create a new group player
      requestBody:
        description: Group player object that needs to be added
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupPlayer'
      responses:
        '201':
          description: Group player created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPlayer'
  /api/group-players/group/{groupId}:
    get:
      tags:
        - group-player
